# AWS-specific overrides — pulls pre-built images from ECR instead of building locally.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.aws.yml up -d mcp-server web
#
# Requires ECR_REGISTRY env var (e.g., 123456789.dkr.ecr.us-east-1.amazonaws.com)

services:
  # Override local postgres — using Neon (external)
  # Replace with a no-op container that satisfies depends_on health checks
  postgres:
    image: alpine:3
    entrypoint: ["sleep", "infinity"]
    restart: "no"
    volumes: []
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 1s
      timeout: 1s
      retries: 1
      start_period: 0s
    deploy:
      resources:
        limits:
          memory: 6M

  mcp-server:
    image: ${ECR_REGISTRY}/aiui-mcp:${IMAGE_TAG:-latest}
    depends_on: {}
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MCP_SERVER_PORT: "8080"
      AIUI_WEB_URL: ${AIUI_WEB_URL:-http://localhost:3000}
      NODE_ENV: production
      MCP_CORS_ORIGINS: ${MCP_CORS_ORIGINS:-*}
      MCP_RATE_LIMIT: ${MCP_RATE_LIMIT:-60}
    deploy:
      resources:
        limits:
          memory: 256M

  web:
    image: ${ECR_REGISTRY}/aiui-web:${IMAGE_TAG:-latest}
    depends_on: {}
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      NEXT_PUBLIC_MCP_URL: ${NEXT_PUBLIC_MCP_URL:-http://localhost:8080/mcp}
      NODE_ENV: production
    deploy:
      resources:
        limits:
          memory: 256M
