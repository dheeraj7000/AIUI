services:
  # MCP Server — the main endpoint AI tools connect to
  - type: web
    name: aiui-mcp
    runtime: node
    region: oregon
    plan: free
    buildCommand: corepack enable && corepack prepare pnpm@9 --activate && pnpm install --frozen-lockfile && pnpm build
    startCommand: sh scripts/start-mcp.sh
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MCP_SERVER_PORT
        value: "8080"
      - key: DATABASE_URL
        sync: false
      - key: AIUI_WEB_URL
        sync: false

  # Web App — dashboard, quick-setup, registry API
  - type: web
    name: aiui-web
    runtime: node
    region: oregon
    plan: free
    buildCommand: corepack enable && corepack prepare pnpm@9 --activate && pnpm install --frozen-lockfile && pnpm build
    startCommand: sh scripts/start-web.sh
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NEXT_PUBLIC_MCP_URL
        sync: false
