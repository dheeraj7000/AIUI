services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aiui
      POSTGRES_USER: aiui
      POSTGRES_PASSWORD: aiui
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiui"]
      interval: 5s
      timeout: 3s
      retries: 5

  mcp-server:
    build:
      context: .
      dockerfile: apps/mcp-server/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://aiui:aiui@postgres:5432/aiui
      MCP_SERVER_PORT: "8080"
      NODE_ENV: production
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://aiui:aiui@postgres:5432/aiui
      NODE_ENV: production
    ports:
      - "3000:3000"

volumes:
  pgdata:
