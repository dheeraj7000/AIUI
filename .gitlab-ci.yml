stages:
  - test
  - deploy

variables:
  AWS_REGION: us-east-1
  ECR_WEB_REPO: aiui-web
  ECR_MCP_REPO: aiui-mcp
  EC2_INSTANCE_TAG: aiui-server

# ---------------------------------------------------------------------------
# CI — build, lint, typecheck, test
# ---------------------------------------------------------------------------
test:
  stage: test
  image: node:20-alpine
  services:
    - name: postgres:16-alpine
      alias: postgres
      variables:
        POSTGRES_DB: aiui_test
        POSTGRES_USER: aiui
        POSTGRES_PASSWORD: aiui
  variables:
    DATABASE_URL: postgresql://aiui:aiui@postgres:5432/aiui_test
  before_script:
    - corepack enable
    - corepack prepare pnpm@9 --activate
    - pnpm install --frozen-lockfile
  script:
    - pnpm build
    - pnpm lint
    - pnpm typecheck
    - pnpm test
  cache:
    key: pnpm-$CI_COMMIT_REF_SLUG
    paths:
      - .pnpm-store/
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_MERGE_REQUEST_IID

# ---------------------------------------------------------------------------
# Deploy — build images, push to ECR, deploy to EC2 via SSM
# ---------------------------------------------------------------------------
deploy:
  stage: deploy
  image: docker:27
  services:
    - docker:27-dind
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - apk add --no-cache aws-cli curl jq
    # Authenticate to AWS via OIDC
    - >
      export $(
        aws sts assume-role-with-web-identity
        --role-arn "$AWS_DEPLOY_ROLE_ARN"
        --role-session-name "gitlab-ci-${CI_PIPELINE_ID}"
        --web-identity-token "$GITLAB_OIDC_TOKEN"
        --duration-seconds 3600
        --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]'
        --output text
        | awk '{print "AWS_ACCESS_KEY_ID="$1" AWS_SECRET_ACCESS_KEY="$2" AWS_SESSION_TOKEN="$3}'
      )
    - export AWS_DEFAULT_REGION=$AWS_REGION
    # Login to ECR
    - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin "$ECR_REGISTRY"
  script:
    - IMAGE_TAG=${CI_COMMIT_SHORT_SHA}

    # Build and push web image
    - >
      docker build -f apps/web/Dockerfile
      -t $ECR_REGISTRY/$ECR_WEB_REPO:$IMAGE_TAG
      -t $ECR_REGISTRY/$ECR_WEB_REPO:latest
      .
    - docker push $ECR_REGISTRY/$ECR_WEB_REPO --all-tags

    # Build and push MCP image
    - >
      docker build -f apps/mcp-server/Dockerfile
      -t $ECR_REGISTRY/$ECR_MCP_REPO:$IMAGE_TAG
      -t $ECR_REGISTRY/$ECR_MCP_REPO:latest
      .
    - docker push $ECR_REGISTRY/$ECR_MCP_REPO --all-tags

    # Find EC2 instance
    - >
      INSTANCE_ID=$(aws ec2 describe-instances
      --filters "Name=tag:Name,Values=$EC2_INSTANCE_TAG" "Name=instance-state-name,Values=running"
      --query "Reservations[0].Instances[0].InstanceId"
      --output text)
    - echo "Deploying to instance $INSTANCE_ID"

    # Deploy via SSM
    - >
      COMMAND_ID=$(aws ssm send-command
      --instance-ids "$INSTANCE_ID"
      --document-name "AWS-RunShellScript"
      --parameters "commands=[
        'cd /opt/aiui',
        'git pull origin main',
        'aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY',
        'export ECR_REGISTRY=$ECR_REGISTRY',
        'export IMAGE_TAG=$IMAGE_TAG',
        'docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.aws.yml pull',
        'docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.aws.yml up -d mcp-server web',
        'docker image prune -f'
      ]"
      --query "Command.CommandId"
      --output text)

    - echo "Waiting for deployment..."
    - aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" || true
    - >
      STATUS=$(aws ssm get-command-invocation
      --command-id "$COMMAND_ID"
      --instance-id "$INSTANCE_ID"
      --query "Status"
      --output text)
    - |
      if [ "$STATUS" != "Success" ]; then
        echo "Deployment failed with status: $STATUS"
        aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "StandardErrorContent" --output text
        exit 1
      fi

    # Health check
    - >
      ALB_DNS=$(aws elbv2 describe-load-balancers
      --names aiui-alb
      --query "LoadBalancers[0].DNSName"
      --output text)
    - echo "Waiting for services to start..."
    - sleep 15
    - echo "Checking web health..."
    - curl -sf "http://$ALB_DNS/api/health" || (echo "Web health check failed" && exit 1)
    - echo "Checking MCP health..."
    - curl -sf "http://$ALB_DNS/health" || (echo "MCP health check failed" && exit 1)
    - echo "Deployment verified!"
    - echo "Web  -> http://$ALB_DNS"
    - echo "MCP  -> http://$ALB_DNS/mcp"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  needs:
    - test
  environment:
    name: production
    url: http://$ALB_DNS
